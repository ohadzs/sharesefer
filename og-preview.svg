<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="12" fill="#f59e0b"/>

  <!-- book mark -->
  <g transform="translate(600,150)">
    <text x="0" y="0" font-family="Apple Color Emoji, Heebo, sans-serif" font-size="120" text-anchor="middle" dominant-baseline="central">📚</text>
  </g>

  <!-- brand -->
  <text x="600" y="330" font-family="Heebo, Arial, sans-serif" font-size="92" font-weight="800"
        fill="#ffffff" text-anchor="middle">ShareSefer</text>

  <!-- Hebrew tagline -->
  <text x="600" y="420" font-family="Heebo, Arial, sans-serif" font-size="46" font-weight="500"
        fill="#e5e7eb" text-anchor="middle" direction="rtl">ספרייה פתוחה להשאלת ספרים — בחינם</text>

  <!-- sub -->
  <text x="600" y="495" font-family="Heebo, Arial, sans-serif" font-size="34" font-weight="400"
        fill="#9ca3af" text-anchor="middle" direction="rtl">שכן משאיל לשכן · ללא תשלום · ללא הרשמה לעיון</text>
</svg>
